<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — BrewTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f0e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 380px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 10px; }
        p  { color: #6b7280; font-size: 14px; margin-bottom: 24px; }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: #6F4E37;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
        .brand {
            font-size: 20px;
            font-weight: 700;
            color: #6F4E37;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="brand">☕ BrewTrack</div>
        <div class="icon">📡</div>
        <h1>You're Offline</h1>
        <p>
            No internet connection detected.
            Please check your WiFi or mobile data and try again.
        </p>
        <a href="/" class="btn" onclick="location.reload()">
            Try Again
        </a>
    </div>
</body>
</html>
